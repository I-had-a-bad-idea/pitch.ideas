<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Pitch</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-left">
            <a href="/">
                <img src="/static/images/logo.svg" alt="Pitch Ideas" class="logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="/auth/logout" class="btn btn-secondary">Logout</a>
        </div>
    </div>
</nav>

<section class="hero small-hero">
    <div class="container">
        <h1>Create a New Pitch</h1>
        <p>Share your startup idea with the community.</p>
    </div>
</section>

<section class="upload-section">
    <div class="container">

        <form class="pitch-form">

            <label for="title">Pitch Title</label>
            <input
                type="text"
                id="title"
                name="title"
                placeholder="e.g. AI Meeting Assistant"
                required
            >

            <label for="topic">Topic</label>
            <input type="text" id="topic" name="topic" list="topic-suggestions" placeholder="Type or select a topic" required>
                <datalist id="topic-suggestions">
                    <option value="AI">
                    <option value="FinTech">
                    <option value="HealthTech">
                    <option value="EdTech">
                    <option value="SaaS">
                    <option value="E-Commerce">
                    <option value="Cybersecurity">
                    <option value="Other">
                </datalist>
            </input>

            <label for="description">Description</label>
            <textarea
                id="description"
                name="description"
                rows="8"
                placeholder="Describe your startup idea..."
                required
            ></textarea>

            <button type="create" class="btn btn-primary">
                Create Pitch
            </button>

        </form>

    </div>
</section>

<footer>
    <div class="disclaimer">
        This is a student project. Content is fictional and for demonstration purposes only.
        No real investment, funding or user data handling is implied.
    </div>
    © 2026 Pitch Ideas
</footer>

<script src="/static/js/create-pitch.js"></script>

</body>
</html>
