<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | pitch.ideas</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="icon" type="image/png" href="static/images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="static/images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="static/images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="static/images/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="pitch.ideas" />
    <link rel="manifest" href="static/images/favicon/site.webmanifest" />

</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-left">
            <a href="/">
                <img src="/static/images/logo.svg" alt="Pitch Ideas" class="logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="/auth/register" class="btn btn-primary">Register</a>
        </div>
    </div>
</nav>

<main class="container">

    <section class="auth-page">

        <h1>Login</h1>
        <p class="subtitle">Welcome back. Please sign in to continue.</p>

        <form method="POST" action="/auth/login" class="auth-form">

            <label for="username">Username</label>
            <input
                type="username"
                id="username"
                name="username"
                placeholder="FirstnameLastname"
                required
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Your password"
                required
            >

            <button type="submit" class="btn btn-primary">
                Login
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a href="/auth/register">Create one</a>
        </p>

    </section>

</main>

<footer>
    <div class="disclaimer">
        This is a student project. Content is fictional and for demonstration purposes only.
    </div>

    © 2026 Pitch Ideas
</footer>

<script type="module" src="/static/js/login.js"></script>

</body>
</html>
