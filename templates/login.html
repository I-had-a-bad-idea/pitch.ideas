<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Pitch Ideas</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-left">
            <a href="/">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Pitch Ideas" class="logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="/auth/register" class="btn btn-primary">Register</a>
        </div>
    </div>
</nav>

<main class="container">

    <section class="auth-page">

        <h1>Login</h1>
        <p class="subtitle">Welcome back. Please sign in to continue.</p>

        <form method="POST" action="/auth/login" class="auth-form">

            <label for="username">Username</label>
            <input
                type="username"
                id="username"
                name="username"
                placeholder="FirstnameLastname"
                required
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Your password"
                required
            >

            <button type="submit" class="btn btn-primary">
                Login
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a href="/auth/register">Create one</a>
        </p>

    </section>

</main>

<footer>
    <div class="disclaimer">
        This is a student project. Content is fictional and for demonstration purposes only.
    </div>

    © 2026 Pitch Ideas
</footer>

</body>
</html>
