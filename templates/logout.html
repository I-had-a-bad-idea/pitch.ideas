<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logout - Pitch Ideas</title>

    <link rel="stylesheet" src="static/css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="container">
        <div class="nav-left">
            <a href="/">
                <img src="static/images/logo.svg" alt="Pitch Ideas" class="logo">
            </a>
        </div>

        <div class="nav-right">

        </div>
    </div>
</nav>

<main class="logout-wrapper">

    <section class="logout-card">

        <h1>Sign out</h1>

        <p class="logout-text">
            Are you sure you want to log out of your account?
        </p>

        <div class="logout-actions">
            <button id="logout-button" class="btn btn-primary">
                Yes, log me out
            </button>

            <a href="/" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </section>
</main>

<footer>
    <div class="disclaimer">
        This is a student project. Content is fictional and for demonstration purposes only.
        No real investment, funding or user data handling is implied.

    © 2026 Pitch Ideas
</footer>

<script src="static/js/logout.js"></script>

</body>
</html>
